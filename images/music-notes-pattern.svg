<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" fill="none">

  <!-- All elements use the same muted purple color -->

  <!-- 1. Half note (top-left) — open notehead + stem -->
  <g transform="translate(62,85) rotate(-5)">
    <ellipse cx="0" cy="0" rx="10" ry="7" stroke="#E8DFE8" stroke-width="2" fill="none" transform="rotate(-20)"/>
    <line x1="7" y1="-5" x2="9" y2="-70" stroke="#E8DFE8" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- 2. Treble clef (top-center-left, large) -->
  <g transform="translate(168,28) scale(0.95)">
    <path d="M11.35,45.61q3.72-4.22,7.69-8a45.71,45.71,0,0,1-2.19-12c-.23-7.24.88-14.93,5-21C23,2.79,25-.25,27.17,0,29,.24,30,2.83,30.72,4.32c4.92,10,5.93,20.54.25,31.93a46,46,0,0,1-7.84,10.8l2.38,12.12a8.74,8.74,0,0,1,.87-.14,14.2,14.2,0,0,1,8.56,1.41c5.6,3,9.08,10.57,8.52,16.83-.5,5.5-3,9.3-7.15,12.63a23.92,23.92,0,0,1-4.24,2.78l2.87,14.62a28.07,28.07,0,0,1,.12,3.74c-.35,7.71-6.35,12.16-13.78,11.82-5.72-.36-11.67-4.9-11.7-10.64-.06-11.13,15-10.6,13.9-.42-.32,3-2.51,5.65-7.21,5.82,3.79,6.28,15.51,1.79,16.31-6.44a17.52,17.52,0,0,0-.69-6.24L29.72,93.65a17.7,17.7,0,0,1-3.07.67A23.71,23.71,0,0,1,8.5,88.66a26,26,0,0,1-8-24.34C2,56.69,6.39,51.26,11.35,45.61Zm9.81-9.53C19.09,28.55,19.4,19,24.73,12.76S35.94,15,28.18,27.42a48.8,48.8,0,0,1-7,8.66Zm0,13c-.67.67-1.36,1.34-2.06,2-4,3.85-8,7.52-11,13a20.65,20.65,0,0,0-1.5,17.23c2.4,7.49,14,12.21,22.65,9.94L24.72,67.63a9.82,9.82,0,0,0-7.09,8,8.7,8.7,0,0,0,3.08,7.81,16.74,16.74,0,0,0,1.81,1.36c1.24.82.63,1.41-.53,1.06-3.87-1.3-6.19-3.44-7.43-6.17-3.67-8.08.83-17.08,8.66-19.92L21.16,49.07ZM31.63,90.43,27.09,67.24a9,9,0,0,1,4.53,1,12,12,0,0,1,6.62,8.23c1.2,5.57-1.7,11.72-6.49,13.94l-.12.05Z"
      fill="#E8DFE8" stroke="none" fill-rule="evenodd"/>
  </g>

  <!-- 3. Quarter note (top area, left of center) -->
  <g transform="translate(320,72) rotate(-8)">
    <line x1="7" y1="-4" x2="8" y2="-68" stroke="#E8DFE8" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="0" cy="0" rx="9" ry="6.5" fill="#E8DFE8" stroke="none" transform="rotate(-20)"/>
  </g>

  <!-- 4. Small eighth note (top center) -->
  <g transform="translate(420,55) rotate(3)">
    <line x1="5" y1="-3" x2="6" y2="-52" stroke="#E8DFE8" stroke-width="1.8" stroke-linecap="round"/>
    <ellipse cx="0" cy="0" rx="7" ry="5" fill="#E8DFE8" stroke="none" transform="rotate(-18)"/>
    <path d="M6,-52 C14,-48 20,-38 17,-28" stroke="#E8DFE8" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- 5. Beamed sixteenth note group (top-right) — 4 notes with double beam -->
  <g transform="translate(720,50) rotate(2)" stroke="#E8DFE8" stroke-linecap="round">
    <!-- Stems first -->
    <line x1="7" y1="-5" x2="8" y2="-72" stroke-width="2"/>
    <line x1="27" y1="-5" x2="28" y2="-74" stroke-width="2"/>
    <line x1="47" y1="-5" x2="48" y2="-76" stroke-width="2"/>
    <line x1="67" y1="-5" x2="68" y2="-78" stroke-width="2"/>
    <!-- Noteheads on top -->
    <ellipse cx="0" cy="0" rx="8" ry="5.5" fill="#E8DFE8" stroke="none" transform="rotate(-15)"/>
    <ellipse cx="20" cy="0" rx="8" ry="5.5" fill="#E8DFE8" stroke="none" transform="rotate(-15)"/>
    <ellipse cx="40" cy="0" rx="8" ry="5.5" fill="#E8DFE8" stroke="none" transform="rotate(-15)"/>
    <ellipse cx="60" cy="0" rx="8" ry="5.5" fill="#E8DFE8" stroke="none" transform="rotate(-15)"/>
    <!-- Double beam -->
    <path d="M8,-72 C22,-74 52,-77 68,-78" stroke-width="3.5" fill="none"/>
    <path d="M8,-64 C22,-66 52,-69 68,-70" stroke-width="3.5" fill="none"/>
  </g>

  <!-- 6. "mp" dynamic marking (center-left) -->
  <g transform="translate(255,230)">
    <text font-family="Georgia, serif" font-size="28" font-style="italic" fill="#E8DFE8" stroke="none">mp</text>
  </g>

  <!-- 7. 3/4 time signature (center-right) -->
  <g transform="translate(590,155)">
    <text font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#E8DFE8" stroke="none" text-anchor="middle">3</text>
    <line x1="-12" y1="6" x2="12" y2="6" stroke="#E8DFE8" stroke-width="1.5"/>
    <text font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#E8DFE8" stroke="none" text-anchor="middle" y="42">4</text>
  </g>

  <!-- 8. Beamed eighth pair (right side, mid) -->
  <g transform="translate(790,225) rotate(-6)" stroke="#E8DFE8" stroke-linecap="round">
    <line x1="7" y1="-5" x2="8" y2="-65" stroke-width="2"/>
    <line x1="37" y1="-5" x2="38" y2="-68" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="8" ry="5.5" fill="#E8DFE8" stroke="none" transform="rotate(-18)"/>
    <ellipse cx="30" cy="0" rx="8" ry="5.5" fill="#E8DFE8" stroke="none" transform="rotate(-18)"/>
    <path d="M8,-65 C18,-67 30,-69 38,-68" stroke-width="3" fill="none"/>
  </g>

  <!-- 9. Eighth note with flag (center, large) -->
  <g transform="translate(390,340) rotate(-4)">
    <line x1="8" y1="-5" x2="9" y2="-82" stroke="#E8DFE8" stroke-width="2.2" stroke-linecap="round"/>
    <ellipse cx="0" cy="0" rx="11" ry="7" fill="#E8DFE8" stroke="none" transform="rotate(-20)"/>
    <path d="M9,-82 C20,-78 28,-64 24,-50 C22,-44 16,-42 12,-46" stroke="#E8DFE8" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- 10. Half note (center-right, large) -->
  <g transform="translate(560,330) rotate(5)">
    <ellipse cx="0" cy="0" rx="12" ry="8" stroke="#E8DFE8" stroke-width="2.2" fill="none" transform="rotate(-20)"/>
    <line x1="8" y1="-6" x2="10" y2="-78" stroke="#E8DFE8" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- 11. Whole note (bottom-left) — just an open oval -->
  <g transform="translate(52,490) rotate(-10)">
    <ellipse cx="0" cy="0" rx="12" ry="8" stroke="#E8DFE8" stroke-width="2" fill="none" transform="rotate(-15)"/>
  </g>

  <!-- 12. Bass clef (bottom-center) -->
  <g transform="translate(310,470)" stroke="#E8DFE8" fill="none" stroke-linecap="round">
    <!-- Main curved body -->
    <path d="M2,0 C2,-14 10,-24 22,-28 C32,-30 38,-22 34,-14 C30,-6 18,-4 10,0 C4,3 2,10 2,16" stroke-width="2.5"/>
    <!-- Two dots -->
    <circle cx="40" cy="-20" r="3" fill="#E8DFE8" stroke="none"/>
    <circle cx="40" cy="-10" r="3" fill="#E8DFE8" stroke="none"/>
  </g>

  <!-- 13. Sharp symbol (bottom-right area) -->
  <g transform="translate(640,480)" stroke="#E8DFE8" stroke-width="2" stroke-linecap="round">
    <line x1="0" y1="-18" x2="0" y2="18"/>
    <line x1="8" y1="-20" x2="8" y2="16"/>
    <line x1="-4" y1="-5" x2="12" y2="-8" stroke-width="2.5"/>
    <line x1="-4" y1="5" x2="12" y2="2" stroke-width="2.5"/>
  </g>

  <!-- 14. Flat symbol (bottom-right) -->
  <g transform="translate(700,478)" stroke="#E8DFE8" stroke-linecap="round" fill="none">
    <line x1="0" y1="-22" x2="0" y2="14" stroke-width="2"/>
    <path d="M0,4 C8,-2 14,-8 12,-14 C10,-18 4,-16 0,-10" stroke-width="2"/>
  </g>

  <!-- 15. Small quarter note (bottom-right) -->
  <g transform="translate(760,470) rotate(6)">
    <line x1="5" y1="-3" x2="6" y2="-48" stroke="#E8DFE8" stroke-width="1.6" stroke-linecap="round"/>
    <ellipse cx="0" cy="0" rx="7" ry="5" fill="#E8DFE8" stroke="none" transform="rotate(-18)"/>
  </g>

  <!-- 16. Small eighth note (bottom far-right) -->
  <g transform="translate(830,465) rotate(-3)">
    <line x1="5" y1="-3" x2="5.5" y2="-44" stroke="#E8DFE8" stroke-width="1.5" stroke-linecap="round"/>
    <ellipse cx="0" cy="0" rx="6.5" ry="4.5" fill="#E8DFE8" stroke="none" transform="rotate(-15)"/>
    <path d="M5.5,-44 C12,-41 16,-34 14,-26" stroke="#E8DFE8" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </g>

</svg>
